# Ástríðr Infrastructure Stack
# Phase 0: Base services (Supabase local, Ollama)
# Phase 1: Full Supabase stack with health checks, network isolation
# Phase 2: Add changedetection.io, additional services

services:
  # ─── Supabase Database ──────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.6.1.143
    container_name: astridr-supabase-db
    restart: unless-stopped
    ports:
      - "54332:5432"
    environment:
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-astridr-local-dev}
      POSTGRES_DB: astridr
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - astridr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d astridr"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Supabase Kong (API Gateway) ───────────────────────────────
  supabase-kong:
    image: kong:2.8.1
    container_name: astridr-supabase-kong
    restart: unless-stopped
    ports:
      - "54331:8000"
      - "54330:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - astridr-network
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Supabase Auth (GoTrue) ────────────────────────────────────
  supabase-auth:
    image: supabase/gotrue:v2.151.0
    container_name: astridr-supabase-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:54331}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${SUPABASE_DB_PASSWORD:-astridr-local-dev}@supabase-db:5432/astridr
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@astridr.local
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_PORT: 587
      GOTRUE_SMTP_SENDER_NAME: Astridr
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
    networks:
      - astridr-network
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Supabase REST (PostgREST) ─────────────────────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.0.1
    container_name: astridr-supabase-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${SUPABASE_DB_PASSWORD:-astridr-local-dev}@supabase-db:5432/astridr
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - astridr-network
    depends_on:
      supabase-db:
        condition: service_healthy
    # PostgREST image has no shell/curl — healthcheck not possible.
    # Dependents use service_started instead of service_healthy.

  # ─── Supabase Meta (pg-meta) ───────────────────────────────────
  supabase-meta:
    image: supabase/postgres-meta:v0.80.0
    container_name: astridr-supabase-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: astridr
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-astridr-local-dev}
    networks:
      - astridr-network
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Supabase Storage ──────────────────────────────────────────
  supabase-storage:
    image: supabase/storage-api:v0.46.4
    container_name: astridr-supabase-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      DATABASE_URL: postgres://supabase_storage_admin:${SUPABASE_DB_PASSWORD:-astridr-local-dev}@supabase-db:5432/astridr
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      IS_MULTITENANT: "false"
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - astridr-network
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Supabase Realtime ─────────────────────────────────────────
  supabase-realtime:
    image: supabase/realtime:v2.28.32
    container_name: astridr-supabase-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: supabase-db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-astridr-local-dev}
      DB_NAME: astridr
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC: "true"
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-for-local-dev-only}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - astridr-network
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      # /api/ping returns 401 without JWT — drop -f so any HTTP response = healthy
      test: ["CMD", "curl", "-so", "/dev/null", "http://localhost:4000/api/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Supabase Studio ───────────────────────────────────────────
  supabase-studio:
    image: supabase/studio:20240422-5cf8f30
    container_name: astridr-supabase-studio
    restart: unless-stopped
    ports:
      - "54333:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_REST_URL: http://supabase-kong:8000/rest/v1/
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU}
    networks:
      - astridr-network
    depends_on:
      supabase-kong:
        condition: service_healthy
      supabase-meta:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/profile', (r) => { process.exit(r.statusCode < 500 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Ástríðr Agent ────────────────────────────────────────────
  astridr:
    build: .
    container_name: astridr-agent
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "8180:8080"
      - "8199:8099"
    volumes:
      - ./config:/app/config:ro
      - astridr-data:/home/astridr/.astridr
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU}
    networks:
      - astridr-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8099/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── Ollama (Local LLM) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: astridr-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - astridr-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  supabase-db-data:
    driver: local
  supabase-storage-data:
    driver: local
  ollama-data:
    driver: local
  astridr-data:
    driver: local

networks:
  astridr-network:
    driver: bridge
    name: astridr-network
