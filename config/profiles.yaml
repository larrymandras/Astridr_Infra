# ─── Runtime Agent Profiles ──────────────────────────────────────
# Lightweight in-session personas switched via /profile command.
# Distinct from the routing profiles above.

agent_profiles:
  - id: default
    name: General Assistant
    tools_enabled: ["*"]
    tools_disabled: []
    max_rounds: 10
    temperature: 0.7

  - id: developer
    name: Developer Mode
    soul_override: "Focus on code quality, debugging, and technical precision."
    tools_enabled: ["*"]
    tools_disabled: [imagegen, tts, canva, remotion, blotato]
    rules_override:
      prefer_code_examples: true
      verbose_tool_explanations: false
    max_rounds: 15
    temperature: 0.3

  - id: researcher
    name: Research Mode
    soul_override: "Focus on thorough analysis, source verification, and comprehensive summaries."
    tools_enabled: [web_search, document_query, memory_search, memory_save, summarizer, hackernews, newsapi, reddit]
    tools_disabled: []
    rules_override:
      always_summarize_first: true
      include_sources: true
    max_rounds: 12
    temperature: 0.5

  - id: writer
    name: Writer Mode
    soul_override: "Focus on creative writing, clear prose, and expressive language."
    tools_enabled: [memory_search, memory_save, web_search, summarizer]
    tools_disabled: []
    rules_override:
      verbose_tool_explanations: false
    max_rounds: 8
    temperature: 0.9

