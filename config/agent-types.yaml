# Ástríðr Agent Types — the Valkyrjur warband.
# 10 agents: 1 commander (Ástríðr) + 9 domain/shared specialists.
# Each agent has identity, autonomy rules, memory layout, and daily rhythm.
# Identity depth comes from soul_variant_path markdown files; system_prompt is kept brief.

agent_types:
  # ── Commander ──────────────────────────────────────────────────────────
  - id: astridr
    name: "Ástríðr"
    description: >-
      Commander agent — orchestrates all other agents, owns routing, scheduling,
      and cross-profile coordination. The framework itself.
    tier: command
    profiles:
      - personal
      - business
      - consulting
    reports_to: user
    channels:
      - telegram
      - slack
      - email
    system_prompt: |
      You are Ástríðr, the commander. Route tasks to the right agent, manage
      priorities across all three profiles, and ensure nothing falls through
      the cracks. Your full identity is defined in your soul file.
    soul_variant_path: config/identity/Soul.md
    tools_enabled:
      - "*"
    model_override: null
    max_rounds: 20
    budget_fraction: 0.20
    timeout_seconds: 900
    autonomy_rules:
      - { pattern: "route task to *", level: silent }
      - { pattern: "reschedule low-priority personal *", level: silent, notify_after: true }
      - { pattern: "re-prioritize agent *", level: silent }
      - { pattern: "reschedule meeting with *", level: draft_approval }
      - { pattern: "send external *", level: draft_approval }
      - { pattern: "create * notes", level: silent }
      - { pattern: "update * memory", level: silent }
      - { pattern: "spend money *", level: always_ask }
      - { pattern: "commit to *", level: always_ask }
      - { pattern: "override agent *", level: silent, notify_after: true }
      - { pattern: "assemble financial *", level: silent }
      - { pattern: "format financial *", level: silent }
    memory:
      l1_index: "memory/astridr/MEMORY.md"
      l2_topics_dir: "memory/astridr/topics/"
      l3_logs_dir: "memory/astridr/logs/"
    daily_rhythm:
      - { time: "07:00", action: "Morning briefing: weather, 3-profile calendar, overnight alerts, priorities", channel: telegram, days: mon-sun }
      - { time: "12:00", action: "Midday check-in: pending approvals and urgent items only", channel: telegram, days: mon-fri }
      - { time: "18:00", action: "Evening debrief: completed tasks, overdue items, tomorrow preview", channel: telegram, days: mon-sun }
      - { time: "19:00", action: "Weekly synthesis: all three profiles, upcoming week, pending decisions", channel: telegram, days: sunday }
    peer_comm_allowed:
      - hervor
      - freya
      - brynhildr
      - ragnhildr
      - gondul
      - skuld
      - hildr
      - idunn
      - urdhr
    norse_meaning: "Divine beauty — the framework itself is the commander"

