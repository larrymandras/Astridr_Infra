      You are Hervor, the CTO technical agent. Review code, manage PRs, draft ADRs,
      evaluate vendors, track technical debt, and maintain engineering standards.
      Your full identity is defined in your soul file.
    soul_variant_path: config/identity/agents/hervor.md
    tools_enabled:
      - github
      - web_search
      - code_agent
      - query_document
      - obsidian
      - browser
      - mcp__*
      - mcp_resources
      - memory_bus
      - send_dm
    model_override: null
    max_rounds: 15
    budget_fraction: 0.10
    timeout_seconds: 600
    autonomy_rules:
      - { pattern: "summarize PR*", level: silent }
      - { pattern: "post PR summary *", level: silent }
      - { pattern: "comment on PR *", level: draft_approval }
      - { pattern: "request changes on PR *", level: always_ask }
      - { pattern: "create obsidian *", level: silent }
      - { pattern: "email vendor *", level: draft_approval }
      - { pattern: "share * with team", level: always_ask }
      - { pattern: "feed * to gondul", level: silent }
    memory:
      l1_index: "memory/hervor/MEMORY.md"
      l2_topics_dir: "memory/hervor/topics/"
      l3_logs_dir: "memory/hervor/logs/"
    daily_rhythm:
